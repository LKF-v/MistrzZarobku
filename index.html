<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MistrzZarobku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #030303;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* TŁO Z CZĄSTECZKAMI ZŁOTA */
        #gold-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* SUBTELNA POŚWIATA W TLE */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }

        /* GŁÓWNY KONTENER */
        .card-container {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        /* SZEFOWSKI TYTUŁ - ZABEZPIECZONY PRZED UCINANIEM */
        .brand-title {
            font-size: clamp(2rem, 8vw, 3.5rem); /* Automatyczne skalowanie do ekranu */
            font-weight: 900;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffe082 0%, #d4af37 40%, #8a6f27 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 15px rgba(212, 175, 55, 0.2));
            transition: transform 0.3s ease;
            user-select: none;
            white-space: nowrap; /* Zakaz łamania tekstu */
        }

        .brand-title:hover {
            transform: scale(1.02);
        }

        .brand-subtitle {
            font-size: clamp(0.65rem, 2vw, 0.8rem);
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: #666666;
            margin-bottom: 40px;
            font-weight: 600;
            text-indent: 0.5em;
        }

        /* SEKTA PRZYCISKÓW */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            width: 100%;
        }

        /* UNIWERSALNY STYL DLA PRZYCISKÓW */
        .btn-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            padding: 16px 36px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            width: 100%;
            max-width: 320px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* PRZYCISK DISCORD */
        .discord-btn {
            background: #ffffff;
            color: #000000;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05), 0 0 40px rgba(212, 175, 55, 0.05);
        }

        .discord-btn:hover {
            transform: translateY(-5px);
            background: #5865F2;
            color: #ffffff;
            border-color: #5865F2;
            box-shadow: 0 15px 40px rgba(88, 101, 242, 0.4), 0 0 30px rgba(212, 175, 55, 0.2);
        }

        /* PRZYCISK TIKTOK */
        .tiktok-btn {
            background: #111111;
            color: #ffffff;
            border: 1px solid #222222;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .tiktok-btn:hover {
            transform: translateY(-5px);
            background: #000000;
            border-color: #ff0050;
            box-shadow: 0 15px 40px rgba(255, 0, 80, 0.3), 0 0 30px rgba(0, 242, 234, 0.1);
        }

        .btn-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <canvas id="gold-canvas"></canvas>
    <div class="ambient-glow"></div>

    <div class="card-container">
        <h1 class="brand-title">MISTRZZAROBKU</h1>
        <p class="brand-subtitle">Oficjalna Społeczność</p>
        
        <div class="links-wrapper">
            <!-- Link do Discorda -->
            <a href="https://discord.gg/vNt59gPfRj" class="btn-link discord-btn" target="_blank">
                <svg viewBox="0 0 127.14 96.36">
                    <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.72-10.93,68.6,68.6,0,0,1-10.64-5.12c.91-.67,1.81-1.37,2.65-2.1a75.22,75.22,0,0,0,72.76,0c.84.73,1.74,1.43,2.65,2.1a68.86,68.86,0,0,1-10.64,5.12,74.74,74.74,0,0,0,6.72,10.93,105.73,105.73,0,0,0,31.39-18.83C130.33,49.22,124.4,26.43,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.93,46,53.72,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.17,46,96,53,91,65.69,84.69,65.69Z"/>
                </svg>
                Dołącz do Discorda
            </a>

            <!-- Link do TikToka -->
            <a href="https://www.tiktok.com/@mistrzzarobku" class="btn-link tiktok-btn" target="_blank">
                <svg viewBox="0 0 448 512">
                    <path d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,185,188.31V278.2a72.36,72.36,0,1,0,40.23,65V0h88.16a117.43,117.43,0,0,0,13.67,41.61,118.62,118.62,0,0,0,52.2,47A116.77,116.77,0,0,0,448,102.23Z"/>
                </svg>
                Obserwuj na TikToku
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gold-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const numParticles = 60;
        const particles = [];

        class GoldParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * height;
            }

            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedY = Math.random() * 0.6 + 0.2;
                this.speedX = Math.random() * 0.4 - 0.2;
                const goldTones = ['rgba(212,175,55,', 'rgba(255,215,0,', 'rgba(244,232,193,'];
                this.colorRoot = goldTones[Math.floor(Math.random() * goldTones.length)];
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > height || this.x < 0 || this.x > width) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.colorRoot + this.opacity + ')';
                ctx.fill();
            }
        }

        for (let i = 0; i < numParticles; i++) {
            particles.push(new GoldParticle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
